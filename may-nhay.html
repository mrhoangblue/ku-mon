<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🚀 Máy Nhảy +1</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ECEFF1; --primary: #607D8B; --card: #FFFFFF; --text: #263238; --neon: #00E5FF;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  body { background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  .header { display: flex; align-items: center; padding: 15px 20px; background: var(--card); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
  .btn-back { font-size: 1.1rem; font-weight: 800; padding: 8px 20px; border-radius: 20px; border: none; cursor: pointer; background: #eee; }
  .progress-bar { flex: 1; height: 12px; background: #E0E0E0; border-radius: 10px; margin: 0 20px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.3s; }

  .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

  /* Giao diện máy tối giản */
  .machine-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
  .box { width: 80px; height: 80px; background: #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; border: 4px solid #37474F; box-shadow: 0 5px 0 #37474F; }
  .main-machine { width: 120px; height: 120px; background: #546E7A; border-radius: 20px; border: 6px solid #263238; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; position: relative; }
  .plus-text { font-size: 1.5rem; font-weight: 900; background: #FF5252; padding: 2px 10px; border-radius: 10px; position: absolute; top: -15px; }

  .output-box { background: #cfd8dc; color: transparent; border-style: dashed; }
  .output-box.show { background: #fff; color: #263238; border-style: solid; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

  @keyframes pop { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }

  .options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; max-width: 500px; }
  .opt-btn { background: #fff; border-radius: 15px; border: 3px solid #CFD8DC; box-shadow: 0 5px 0 #CFD8DC; padding: 15px 0; font-size: 1.8rem; font-weight: 900; cursor: pointer; text-align: center; }
  .opt-btn:active { transform: translateY(4px); box-shadow: none; }
  .opt-btn.ok { border-color: #00E676; background: #E8F5E9; color: #1B5E20; }
  .opt-btn.err { border-color: #FF5252; background: #FFEBEE; animation: shake 0.4s; }

  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

  .victory { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
</style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="location.href='index.html'">◂ Thoát</button>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div style="font-weight:900" id="score">0 ⭐</div>
</div>

<div class="stage">
  <div class="machine-wrap">
    <div class="box" id="in-val">0</div>
    <div style="font-size: 2rem;">➔</div>
    <div class="main-machine">
      <div class="plus-text">+ 1</div>
      <div style="font-size: 2.5rem;">🚀</div>
    </div>
    <div style="font-size: 2rem;">➔</div>
    <div class="box output-box" id="out-val">?</div>
  </div>

  <div class="options" id="opts"></div>
</div>

<div class="victory" id="vic">
  <h1 style="font-size:3rem">🌟 GIỎI QUÁ!</h1>
  <p style="margin-bottom:20px; font-weight:bold">Con đã hoàn thành thử thách!</p>
  <button style="padding:15px 30px; background:#00BCD4; color:white; border:none; border-radius:25px; font-weight:900;" onclick="location.href='index.html'">Quay về Bản Đồ</button>
</div>

<script>
  let step = 0, score = 0, ans = 0, locked = false;

  function play() {
    locked = false;
    if (step >= 10) {
      document.getElementById('vic').style.display = 'flex';
      localStorage.setItem('kumon_level5_done', 'true');
      return;
    }
    document.getElementById('prog').style.width = (step * 10) + '%';
    const outBox = document.getElementById('out-val');
    outBox.classList.remove('show');
    outBox.textContent = '?';

    const num = step < 5 ? Math.floor(Math.random()*9)+1 : Math.floor(Math.random()*20)+1;
    ans = num + 1;
    document.getElementById('in-val').textContent = num;

    let arr = [ans];
    while(arr.length < 8) {
      let r = ans + Math.floor(Math.random()*7) - 3;
      if(r > 0 && !arr.includes(r)) arr.push(r);
    }
    arr.sort((a,b) => a-b);

    const grid = document.getElementById('opts');
    grid.innerHTML = '';
    arr.forEach(v => {
      const b = document.createElement('div');
      b.className = 'opt-btn';
      b.textContent = v;
      b.onclick = () => {
        if(locked) return;
        if(v === ans) {
          locked = true;
          score++;
          document.getElementById('score').textContent = score + ' ⭐';
          b.classList.add('ok');
          outBox.textContent = ans;
          outBox.classList.add('show');
          setTimeout(() => { step++; play(); }, 1200);
        } else {
          b.classList.add('err');
          setTimeout(() => b.classList.remove('err'), 500);
        }
      };
      grid.appendChild(b);
    });
  }
  window.onload = play;
</script>
</body>
</html>
