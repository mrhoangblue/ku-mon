<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🚀 Máy Nhảy +1 - Kumon Math</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ECEFF1; --primary: #607D8B; --primary-dark: #455A64;
    --card: #FFFFFF; --text: #263238; --text-muted: #78909C;
    --machine: #546E7A; --neon: #00E5FF;
  }
  
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }

  body {
    background: var(--bg); font-family: 'Nunito', sans-serif;
    color: var(--text); height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 20px; background: var(--card);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 10;
  }
  .btn-back {
    font-size: 1.1rem; font-weight: 800; color: var(--text-muted);
    background: #f0f4f8; padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer;
  }
  .progress-bar {
    flex: 1; height: 10px; background: #E0E0E0; border-radius: 10px;
    margin: 0 20px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--neon); width: 0%;
    transition: width 0.4s ease; border-radius: 10px;
  }
  .stars { font-size: 1.2rem; font-weight: 900; color: #FF9800; }

  .stage {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; width: 100%; max-width: 600px; margin: 0 auto;
  }

  .machine-container {
    position: relative; width: 100%; height: 200px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 40px;
  }
  .machine-body {
    width: 220px; height: 140px; background: var(--machine);
    border-radius: 20px; border: 6px solid #37474F;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative; box-shadow: 0 10px 0 #263238, 0 0 20px rgba(0,229,255,0.1);
  }
  
  .gear { font-size: 3.5rem; transition: transform 0.5s; }
  /* Chỉ xoay khi có class .working */
  .machine-body.working .gear {
    animation: gearRotate 1s linear infinite;
  }

  @keyframes gearRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .machine-label {
    position: absolute; top: -15px; background: #FF5252; color: white;
    padding: 2px 15px; border-radius: 10px; font-weight: 900; font-size: 1.2rem;
  }
  .input-hole, .output-hole {
    width: 60px; height: 80px; background: #263238; position: absolute; top: 30px;
    border-radius: 10px; border: 4px solid #455A64;
  }
  .input-hole { left: -40px; }
  .output-hole { right: -40px; }

  .number-pill {
    width: 70px; height: 70px; background: #fff; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; font-weight: 900; color: var(--primary-dark);
    border: 4px solid var(--neon); position: absolute; z-index: 5;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  
  .pill-in { left: -35px; animation: slideIn 0.8s ease forwards; }
  .pill-out { right: -35px; animation: slideOut 1.2s ease forwards; }

  @keyframes slideIn { 0% { transform: translateX(-100px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
  @keyframes slideOut { 0% { transform: translateX(0); opacity: 1; } 100% { transform: translateX(150px); opacity: 0; } }

  .options-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%;
  }
  .option-btn {
    background: #fff; border-radius: 18px; border: 3px solid #CFD8DC;
    box-shadow: 0 5px 0 #CFD8DC; padding: 15px 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem; font-weight: 900; color: var(--text);
    cursor: pointer; transition: all 0.1s;
  }
  .option-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #CFD8DC; }
  .option-btn.correct { border-color: #00E676; background: #E8F5E9; color: #1B5E20; }
  .option-btn.wrong { border-color: #FF5252; background: #FFEBEE; color: #B71C1C; animation: shake 0.4s; }

  .victory {
    display: none; position: fixed; inset: 0; background: rgba(236, 239, 241, 0.98);
    flex-direction: column; align-items: center; justify-content: center; z-index: 100;
  }

  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
</style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="location.href='index.html'">◂ Quay lại</button>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="stars" id="score-txt">0 ⭐</div>
</div>

<div class="stage">
  <div style="text-align: center; margin-bottom: 20px;">
    <h2 style="color: var(--primary-dark);">Máy Nhảy +1</h2>
    <p style="color: var(--text-muted); font-weight: 700;">Số chui ra khỏi máy là số mấy nhỉ?</p>
  </div>

  <div class="machine-container">
    <div class="input-hole"></div>
    <div id="pill-container-in"></div>
    <div class="machine-body" id="machine-body"><div class="machine-label">+ 1</div><div class="gear">⚙️</div></div>
    <div class="output-hole"></div>
    <div id="pill-container-out"></div>
  </div>

  <div class="options-grid" id="options"></div>
</div>

<div class="victory" id="victory">
  <div style="font-size: 6rem; margin-bottom: 20px;">🚀✨</div>
  <h1 style="color: var(--primary-dark);">Siêu Nhân Toán Học!</h1>
  <p style="margin-bottom: 30px; font-weight: 700; color: var(--text-muted);">Con đã hoàn thành lộ trình!</p>
  <button style="padding: 15px 40px; background: #00BCD4; color:white; border:none; border-radius:30px; font-weight:900; font-size:1.2rem; cursor:pointer;" onclick="location.href='index.html'">Quay về Bản Đồ 🗺️</button>
</div>

<script>
  let current = 0, score = 0, target = 0, isWaiting = false;
  function loadQuestion() {
    isWaiting = false;
    document.getElementById('prog-fill').style.width = (current/10*100)+'%';
    document.getElementById('machine-body').classList.remove('working');
    document.getElementById('pill-container-out').innerHTML = '';
    const input = current < 5 ? Math.floor(Math.random()*9)+1 : Math.floor(Math.random()*20)+1;
    target = input + 1;
    document.getElementById('pill-container-in').innerHTML = `<div class="number-pill pill-in">${input}</div>`;
    let opts = [target];
    while(opts.length<8){
      let r = target + Math.floor(Math.random()*7)-3;
      if(r>0 && !opts.includes(r)) opts.push(r);
    }
    opts.sort((a,b)=>a-b);
    const grid = document.getElementById('options');
    grid.innerHTML = '';
    opts.forEach(n => {
      const btn = document.createElement('div'); btn.className = 'option-btn'; btn.textContent = n;
      btn.onclick = () => {
        if(isWaiting) return;
        if(n === target){
          isWaiting = true; score++; document.getElementById('score-txt').textContent = score+' ⭐';
          btn.classList.add('correct'); document.getElementById('machine-body').classList.add('working');
          setTimeout(() => { document.getElementById('pill-container-out').innerHTML = `<div class="number-pill pill-out">${n}</div>`; }, 300);
          setTimeout(() => { current++; if(current<10) loadQuestion(); else { document.getElementById('victory').style.display='flex'; localStorage.setItem('kumon_level5_done','true'); } }, 1500);
        } else { btn.classList.add('wrong'); setTimeout(() => btn.classList.remove('wrong'), 500); }
      };
      grid.appendChild(btn);
    });
  }
  window.onload = loadQuestion;
</script>
</body>
</html>
