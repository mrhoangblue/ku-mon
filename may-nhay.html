<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🚀 Máy Nhảy +1</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --bg: #ECEFF1; --card: #FFFFFF; --text: #263238; --neon: #00E5FF; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  body { background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* Header */
  .header { display: flex; align-items: center; padding: 15px 20px; background: var(--card); box-shadow: 0 4px 10px rgba(0,0,0,0.05); z-index: 10; }
  .btn-back { font-size: 1rem; font-weight: 800; padding: 8px 15px; border-radius: 15px; border: none; cursor: pointer; background: #eee; color: #555; }
  .prog-container { flex: 1; height: 10px; background: #E0E0E0; border-radius: 10px; margin: 0 15px; overflow: hidden; }
  #prog-bar { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  #stars-count { font-weight: 900; color: #FF9800; min-width: 50px; text-align: right; }

  /* Game Area */
  .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; gap: 30px; }

  /* Giao diện máy */
  .machine-display { display: flex; align-items: center; gap: 15px; }
  .pill-box { 
    width: 75px; height: 75px; background: #fff; border-radius: 15px; 
    display: flex; align-items: center; justify-content: center; 
    font-size: 2.2rem; font-weight: 900; border: 4px solid #37474F; 
    box-shadow: 0 4px 0 #37474F; position: relative;
  }
  .machine-core { 
    width: 130px; height: 130px; background: #546E7A; border-radius: 25px; 
    border: 6px solid #263238; display: flex; flex-direction: column; 
    align-items: center; justify-content: center; color: white; position: relative; 
  }
  .label-plus { font-size: 1.4rem; font-weight: 900; background: #FF5252; padding: 2px 12px; border-radius: 10px; position: absolute; top: -15px; box-shadow: 0 3px 0 #B71C1C; }
  .rocket-icon { font-size: 2.8rem; }

  #out-val { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  .hidden-num { color: transparent; background: #cfd8dc; border-style: dashed; }
  .revealed-num { color: #263238; background: #fff; border-style: solid; transform: scale(1.1); }

  /* Bàn phím đáp án */
  .choices-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 480px; }
  .choice-card { 
    background: #fff; border-radius: 15px; border: 3px solid #CFD8DC; 
    box-shadow: 0 5px 0 #CFD8DC; padding: 15px 0; font-size: 1.8rem; 
    font-weight: 900; cursor: pointer; text-align: center; transition: transform 0.1s;
  }
  .choice-card:active { transform: translateY(4px); box-shadow: none; }
  .choice-card.correct { border-color: #00E676; background: #E8F5E9; color: #1B5E20; box-shadow: 0 5px 0 #1B5E20; pointer-events: none; }
  .choice-card.wrong { border-color: #FF5252; background: #FFEBEE; animation: shake 0.4s; }

  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  /* Victory */
  #victory-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.98); flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; text-align: center; }
  .btn-done { padding: 15px 40px; background: #00BCD4; color: white; border: none; border-radius: 30px; font-weight: 900; font-size: 1.2rem; cursor: pointer; margin-top: 20px; box-shadow: 0 5px 0 #00838F; }

  @media (max-width: 400px) {
    .pill-box { width: 60px; height: 60px; font-size: 1.8rem; }
    .machine-core { width: 100px; height: 100px; }
  }
</style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="window.location.href='index.html'">◂ Thoát</button>
  <div class="prog-container"><div id="prog-bar"></div></div>
  <div id="stars-count">0 ⭐</div>
</div>

<div class="game-area">
  <div style="text-align:center">
    <h2 style="color:#455A64">Máy Nhảy +1</h2>
    <p style="color:#78909C; font-weight:700">Số mấy sẽ chui ra nhỉ?</p>
  </div>

  <div class="machine-display">
    <div class="pill-box" id="in-val">?</div>
    <div style="font-size: 1.5rem; color:#90A4AE">➔</div>
    <div class="machine-core">
      <div class="label-plus">+ 1</div>
      <div class="rocket-icon">🚀</div>
    </div>
    <div style="font-size: 1.5rem; color:#90A4AE">➔</div>
    <div class="pill-box hidden-num" id="out-val">?</div>
  </div>

  <div class="choices-grid" id="choices-area"></div>
</div>

<div id="victory-overlay">
  <div style="font-size: 5rem;">🏆</div>
  <h1 style="font-size: 2.5rem; color: #263238;">BÉ GIỎI QUÁ!</h1>
  <p style="font-weight: 700; color: #78909C;">Con đã hoàn thành toàn bộ thử thách!</p>
  <button class="btn-done" onclick="window.location.href='index.html'">Quay về Bản Đồ 🗺️</button>
</div>

<script>
  // Quản lý trạng thái bằng một Object duy nhất để tránh xung đột
  const gameState = {
    step: 0,
    score: 0,
    target: 0,
    isProcessing: false,
    maxSteps: 10
  };

  function createLevel() {
    if (gameState.step >= gameState.maxSteps) {
      showVictory();
      return;
    }

    gameState.isProcessing = false;
    
    // Cập nhật giao diện
    document.getElementById('prog-bar').style.width = (gameState.step * 10) + '%';
    document.getElementById('stars-count').textContent = gameState.score + ' ⭐';
    
    const outBox = document.getElementById('out-val');
    outBox.className = 'pill-box hidden-num';
    outBox.textContent = '?';

    // Tính toán số (Sử dụng logic an toàn không dùng while vô tận)
    const base = gameState.step < 5 ? Math.floor(Math.random() * 9) + 1 : Math.floor(Math.random() * 20) + 1;
    gameState.target = base + 1;
    document.getElementById('in-val').textContent = base;

    // Sinh đáp án (Cố định 8 lựa chọn)
    const options = new Set([gameState.target]);
    let safetyNet = 0;
    while(options.size < 8 && safetyNet < 50) {
      let offset = Math.floor(Math.random() * 11) - 5; // -5 đến +5
      let val = gameState.target + offset;
      if (val > 0 && val < 40) options.add(val);
      safetyNet++;
    }

    const sortedOptions = Array.from(options).sort((a, b) => a - b);
    renderButtons(sortedOptions);
  }

  function renderButtons(arr) {
    const area = document.getElementById('choices-area');
    area.innerHTML = '';
    arr.forEach(val => {
      const btn = document.createElement('div');
      btn.className = 'choice-card';
      btn.textContent = val;
      // Dùng pointerdown cho iPad nhạy hơn click
      btn.onpointerdown = (e) => {
        e.preventDefault();
        handleAnswer(btn, val);
      };
      area.appendChild(btn);
    });
  }

  function handleAnswer(element, val) {
    if (gameState.isProcessing) return;

    if (val === gameState.target) {
      gameState.isProcessing = true;
      gameState.score++;
      gameState.step++;

      element.classList.add('correct');
      
      const outBox = document.getElementById('out-val');
      outBox.textContent = gameState.target;
      outBox.className = 'pill-box revealed-num';

      // Chuyển câu hỏi sau 1 giây
      setTimeout(createLevel, 1000);
    } else {
      element.classList.add('wrong');
      setTimeout(() => element.classList.remove('wrong'), 500);
    }
  }

  function showVictory() {
    document.getElementById('victory-overlay').style.display = 'flex';
    localStorage.setItem('kumon_level5_done', 'true');
  }

  // Khởi chạy an toàn
  window.onload = () => {
    // Đảm bảo không bị load lại index cũ từ cache
    console.log("Game Engine v2.0 Started");
    createLevel();
  };
</script>
</body>
</html>
