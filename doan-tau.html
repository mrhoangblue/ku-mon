<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🚂 Đoàn Tàu Số</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #E0F7FA; --primary: #00BCD4; --primary-dark: #0097A7;
    --card: #FFFFFF; --text: #263238; --text-muted: #78909C;
    --train-red: #EF5350; --train-blue: #42A5F5; --train-yellow: #FFCA28; --train-green: #66BB6A;
  }
  
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }

  body {
    background: var(--bg); font-family: 'Nunito', sans-serif;
    color: var(--text); height: 100vh;
    display: flex; flex-direction: column; overflow: hidden;
  }

  /* --- HEADER --- */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 20px; background: var(--card);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05); z-index: 10;
  }
  .btn-back {
    font-size: 1.2rem; font-weight: 800; color: var(--text-muted);
    background: #f0f4f8; padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer;
  }
  .btn-back:active { transform: scale(0.95); }
  .progress-bar {
    flex: 1; height: 10px; background: #E0E0E0; border-radius: 10px;
    margin: 0 20px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--primary); width: 0%;
    transition: width 0.4s ease; border-radius: 10px;
  }
  .stars { font-size: 1.2rem; font-weight: 900; color: #FF9800; }

  /* --- STAGE --- */
  .stage {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 20px; width: 100%; max-width: 700px; margin: 0 auto;
    position: relative;
  }
  
  .instruction {
    font-size: 1.2rem; font-weight: 800; color: var(--primary-dark);
    margin-bottom: 30px; text-align: center;
    background: #fff; padding: 10px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,188,212,0.15);
  }

  /* --- TRAIN DESIGN --- */
  .train-container {
    display: flex; align-items: flex-end; gap: 8px; margin-bottom: 50px;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .train-container.drive-away {
    transform: translateX(150vw);
  }
  .train-container.drive-in {
    animation: driveIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }
  @keyframes driveIn {
    0% { transform: translateX(-150vw); }
    100% { transform: translateX(0); }
  }

  .locomotive { font-size: 4.5rem; line-height: 1; margin-right: 5px; animation: bounceTrain 0.5s infinite alternate; }
  
  .carriage {
    width: 65px; height: 60px; border-radius: 10px 10px 4px 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; font-weight: 900; color: #fff;
    position: relative; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    animation: bounceTrain 0.5s infinite alternate;
  }
  
  /* Bánh xe */
  .carriage::before, .carriage::after {
    content: ''; position: absolute; bottom: -10px; width: 18px; height: 18px;
    background: #333; border: 3px solid #CFD8DC; border-radius: 50%;
  }
  .carriage::before { left: 8px; }
  .carriage::after { right: 8px; }
  
  /* Khớp nối */
  .carriage + .carriage::before {
    content: ''; position: absolute; left: -10px; bottom: 15px;
    width: 10px; height: 6px; background: #607D8B; border-radius: 3px; border: none;
  }

  .c-0 { background: var(--train-red); animation-delay: 0.1s; }
  .c-1 { background: var(--train-blue); animation-delay: 0.2s; }
  .c-2 { background: var(--train-yellow); color: #333; animation-delay: 0.3s; }
  .c-3 { background: var(--train-green); animation-delay: 0.4s; }

  .carriage.missing {
    background: #FFFFFF; color: var(--text-muted); border: 3px dashed #B0BEC5;
    box-shadow: none;
  }
  .carriage.missing.filled {
    background: var(--primary); color: #fff; border: none; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* --- OPTIONS --- */
  .options-grid {
    display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%;
  }
  .opt-btn {
    width: 75px; height: 75px; background: var(--card); border-radius: 20px;
    border: 4px solid #E0E0E0; box-shadow: 0 6px 0 #E0E0E0;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5rem; font-weight: 900; color: var(--text);
    cursor: pointer; transition: all 0.1s;
  }
  .opt-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #E0E0E0; }
  .opt-btn.wrong { border-color: #EF5350; background: #FFEBEE; color: #EF5350; animation: shake 0.4s; }
  .opt-btn.dimmed { opacity: 0.3; pointer-events: none; }

  /* --- VICTORY SCREEN --- */
  .victory {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    position: absolute; inset: 0; background: rgba(224, 247, 250, 0.95); z-index: 100;
  }
  .victory h1 { font-size: 2.5rem; color: var(--primary-dark); margin-bottom: 10px; text-align: center; }
  .victory p { font-size: 1.1rem; color: var(--text-muted); font-weight: 700; margin-bottom: 30px; }
  .btn-next {
    font-size: 1.3rem; font-weight: 900; background: var(--primary); color: white;
    padding: 15px 40px; border-radius: 30px; border: none; cursor: pointer;
    box-shadow: 0 8px 0 var(--primary-dark);
  }
  .btn-next:active { transform: translateY(8px); box-shadow: 0 0 0 var(--primary-dark); }

  /* Animations */
  @keyframes bounceTrain { 0% { transform: translateY(0); } 100% { transform: translateY(-4px); } }
  @keyframes popIn { 0% { transform: scale(0.5); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

  @media(max-width: 480px) {
    .locomotive { font-size: 3.5rem; }
    .carriage { width: 50px; height: 45px; font-size: 1.5rem; }
    .opt-btn { width: 65px; height: 65px; font-size: 2rem; }
  }
</style>
</head>
<body>

  <div class="header">
    <button class="btn-back" onclick="goHome()">◂ Quay lại</button>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="stars" id="score-txt">0 ⭐</div>
  </div>

  <div class="stage">
    <div class="instruction">Bé hãy tìm số lên đúng toa tàu nhé! 🛤️</div>
    
    <div class="train-container" id="train-container">
      </div>

    <div class="options-grid" id="options-grid">
      </div>
  </div>

  <div class="victory" id="victory">
    <div style="font-size: 5rem; animation: popIn 1s infinite alternate;">🚂</div>
    <h1>Trạm 3: Hoàn Thành!</h1>
    <p>Bé đếm số thứ tự siêu quá!</p>
    <button class="btn-next" onclick="completeStation()">Mở khóa trạm tiếp theo 🚀</button>
  </div>

<script>
  const TOTAL_QUESTIONS = 10;
  let currentQuestion = 0;
  let score = 0;
  let isAnimating = false;
  let currentMissingNumber = 0;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function rnd(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function initGame() {
    currentQuestion = 0; score = 0;
    document.getElementById('victory').style.display = 'none';
    loadQuestion();
  }

  function loadQuestion() {
    isAnimating = false;
    document.getElementById('prog-fill').style.width = ((currentQuestion / TOTAL_QUESTIONS) * 100) + '%';
    document.getElementById('score-txt').textContent = score + ' ⭐';

    const trainContainer = document.getElementById('train-container');
    trainContainer.className = 'train-container drive-in'; // Hồi sinh animation chạy vào

    // 1. Xác định dãy số dựa theo tiến trình
    let startNum;
    if (currentQuestion < 3) startNum = rnd(1, 6);        // Câu 1-3: Số nhỏ (1-10)
    else if (currentQuestion < 6) startNum = rnd(10, 16); // Câu 4-6: Số vừa (10-20)
    else startNum = rnd(20, 26);                          // Câu 7-10: Số lớn (20-30)

    let sequenceLength = 4; // Tàu có 4 toa
    let sequence = Array.from({length: sequenceLength}, (_, i) => startNum + i);
    
    // Đôi khi làm dãy số lùi để tăng tư duy (áp dụng cho câu khó)
    if (currentQuestion >= 7 && Math.random() > 0.5) {
      startNum = rnd(5, 30);
      sequence = Array.from({length: sequenceLength}, (_, i) => startNum - i);
    }

    // 2. Chọn toa bị thiếu
    let missingIndex = rnd(0, sequenceLength - 1);
    currentMissingNumber = sequence[missingIndex];

    // 3. Render Train
    trainContainer.innerHTML = `<div class="locomotive">🚂</div>`;
    sequence.forEach((num, index) => {
      const carriage = document.createElement('div');
      carriage.className = `carriage c-${index}`;
      
      if (index === missingIndex) {
        carriage.classList.add('missing');
        carriage.id = 'missing-carriage';
        carriage.textContent = '?';
      } else {
        carriage.textContent = num;
      }
      trainContainer.appendChild(carriage);
    });

    // 4. Generate Options
    let options = [currentMissingNumber];
    while (options.length < 4) {
      let wrongOpt = currentMissingNumber + rnd(-3, 3); // Lấy số gần đó để gây nhầm lẫn
      if (wrongOpt > 0 && !options.includes(wrongOpt) && !sequence.includes(wrongOpt)) {
        options.push(wrongOpt);
      }
    }
    options = shuffle(options);

    const optionsGrid = document.getElementById('options-grid');
    optionsGrid.innerHTML = '';
    options.forEach(num => {
      const btn = document.createElement('div');
      btn.className = 'opt-btn';
      btn.textContent = num;
      btn.onclick = () => checkAnswer(btn, num);
      optionsGrid.appendChild(btn);
    });
  }

  function checkAnswer(btn, num) {
    if (isAnimating) return;

    if (num === currentMissingNumber) {
      isAnimating = true;
      btn.style.background = 'var(--correct)';
      btn.style.color = '#fff';
      
      // Làm mờ các ô khác
      document.querySelectorAll('.opt-btn').forEach(card => {
        if (card !== btn) card.classList.add('dimmed');
      });

      // Điền số vào toa tàu
      const missingCarriage = document.getElementById('missing-carriage');
      missingCarriage.textContent = num;
      missingCarriage.classList.remove('missing');
      missingCarriage.classList.add('filled');

      score++;
      document.getElementById('score-txt').textContent = score + ' ⭐';

      // Chờ một chút, cho tàu chạy đi, rồi load câu mới
      setTimeout(() => {
        document.getElementById('train-container').className = 'train-container drive-away';
        
        setTimeout(() => {
          currentQuestion++;
          if (currentQuestion < TOTAL_QUESTIONS) {
            loadQuestion();
          } else {
            showVictory();
          }
        }, 800); // Đợi tàu chạy khuất màn hình

      }, 1000); // Đợi bé nhìn kết quả

    } else {
      // Sai
      isAnimating = true;
      btn.classList.add('wrong');
      setTimeout(() => {
        btn.classList.remove('wrong');
        isAnimating = false;
      }, 500);
    }
  }

  function showVictory() {
    document.getElementById('prog-fill').style.width = '100%';
    document.getElementById('victory').style.display = 'flex';
    // Đánh dấu hoàn thành Trạm 3 vào localStorage
    localStorage.setItem('kumon_level3_done', 'true');
  }

  function completeStation() {
    window.location.href = 'index.html';
  }

  function goHome() {
    window.location.href = 'index.html';
  }

  // Khởi động
  initGame();

</script>
</body>
</html>
