<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bản Đồ Kumon</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Nunito', sans-serif; background: #F0F4F8; margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
  .map { position: relative; width: 100%; max-width: 600px; height: 100%; background: url('https://img.freepik.com/free-vector/landscape-with-mountains-river_1308-30674.jpg') no-repeat center; background-size: cover; }
  .node { position: absolute; width: 70px; height: 70px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index: 5; transition: 0.3s; }
  .node-label { position: absolute; bottom: -25px; font-weight: 900; background: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; white-space: nowrap; border: 1px solid #ddd; }
  
  .locked { background: #B0BEC5; filter: grayscale(1); pointer-events: none; opacity: 0.8; }
  .current { background: #FFEB3B; border: 4px solid #FBC02D; animation: pulse 1.5s infinite; }
  .done { background: #4CAF50; border: 4px solid #2E7D32; color: white; }
  
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  
  #n1 { top: 80%; left: 15%; }
  #n2 { top: 65%; left: 55%; }
  #n3 { top: 45%; left: 25%; }
  #n4 { top: 25%; left: 70%; }
  #n5 { top: 10%; left: 35%; }
</style>
</head>
<body>

<div class="map">
  <div id="n1" class="node current" onclick="location.href='bang-so.html'"><span>🔢</span><div class="node-label">Bảng Số</div></div>
  <div id="n2" class="node locked" onclick="location.href='noi-diem.html'"><span>✏️</span><div class="node-label">Nối Điểm</div></div>
  <div id="n3" class="node locked" onclick="location.href='doan-tau.html'"><span>🚂</span><div class="node-label">Đoàn Tàu</div></div>
  <div id="n4" class="node locked" onclick="location.href='ban-cua-10.html'"><span>🧪</span><div class="node-label">Bạn Của 10</div></div>
  <div id="n5" class="node locked" onclick="location.href='may-nhay.html'"><span>🚀</span><div class="node-label">Máy Nhảy</div></div>
</div>

<script>
  window.onload = function() {
    const ids = ['kumon_level1_done', 'kumon_level2_done', 'kumon_level3_done', 'kumon_level4_done', 'kumon_level5_done'];
    ids.forEach((key, i) => {
      const node = document.getElementById('n' + (i + 1));
      const next = document.getElementById('n' + (i + 2));
      if (localStorage.getItem(key) === 'true') {
        node.className = 'node done';
        if (next) next.className = 'node current';
      }
    });
  };
</script>
</body>
</html>
