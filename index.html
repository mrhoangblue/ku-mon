<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Học Toán Cùng Bé - Kumon</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Nunito', sans-serif; background: #F0F4F8; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
  .map-container { position: relative; width: 100%; max-width: 600px; height: 100%; background: url('https://img.freepik.com/free-vector/landscape-with-mountains-river_1308-30674.jpg') no-repeat center; background-size: cover; }
  .node { position: absolute; width: 80px; height: 80px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  .node-label { position: absolute; bottom: -25px; font-weight: 900; background: white; padding: 2px 10px; border-radius: 10px; font-size: 12px; white-space: nowrap; }
  
  /* Trạng thái */
  .node-locked { background: #B0BEC5; filter: grayscale(1); pointer-events: none; opacity: 0.7; }
  .node-current { background: #FFEB3B; border: 4px solid #FBC02D; animation: pulse 1.5s infinite; }
  .node-completed { background: #4CAF50; border: 4px solid #2E7D32; color: white; }
  
  @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
  
  /* Vị trí các trạm trên bản đồ */
  #node1 { top: 80%; left: 20%; }
  #node2 { top: 65%; left: 60%; }
  #node3 { top: 45%; left: 30%; }
  #node4 { top: 25%; left: 70%; }
  #node5 { top: 10%; left: 40%; }
</style>
</head>
<body>

<div class="map-container">
  <div id="node1" class="node node-current" onclick="location.href='bang-so.html'">
    <span style="font-size:30px">🔢</span>
    <div class="node-label">Trạm 1: Bảng Số</div>
  </div>
  
  <div id="node2" class="node node-locked" onclick="location.href='noi-diem.html'">
    <span style="font-size:30px">✏️</span>
    <div class="node-label">Trạm 2: Nối Điểm</div>
  </div>

  <div id="node3" class="node node-locked" onclick="location.href='doan-tau.html'">
    <span style="font-size:30px">🚂</span>
    <div class="node-label">Trạm 3: Đoàn Tàu</div>
  </div>

  <div id="node4" class="node node-locked" onclick="location.href='ban-cua-10.html'">
    <span style="font-size:30px">🧪</span>
    <div class="node-label">Trạm 4: Bạn Của 10</div>
  </div>

  <div id="node5" class="node node-locked" onclick="location.href='may-nhay.html'">
    <span style="font-size:30px">🚀</span>
    <div class="node-label">Trạm 5: Máy Nhảy</div>
  </div>
</div>

<script>
  function updateMap() {
    const levels = ['kumon_level1_done', 'kumon_level2_done', 'kumon_level3_done', 'kumon_level4_done', 'kumon_level5_done'];
    levels.forEach((key, index) => {
      const node = document.getElementById('node' + (index + 1));
      const nextNode = document.getElementById('node' + (index + 2));
      
      if (localStorage.getItem(key) === 'true') {
        node.classList.remove('node-current', 'node-locked');
        node.classList.add('node-completed');
        if (nextNode) {
          nextNode.classList.remove('node-locked');
          nextNode.classList.add('node-current');
        }
      }
    });
  }
  window.onload = updateMap;
</script>
</body>
</html>
